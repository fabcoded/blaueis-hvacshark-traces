# channels.yaml — Session processing configuration
# Place this file in each session folder next to the exported CSV.
# The dump converter (and future pcap/packet reshaping tools) read this
# to know which CSV to load and how to interpret each channel.

channels:

  - name: "mainboardGrey"
    csv: "Session 2.csv"
    comment: "CN1grey wire - to mainboard - rxd pin"
    connectedComponents: "ACdisplay-ACmainboard"
    busType: "disp-mainboard_1"
    direction: "toACmainboard"

  - name: "mainboardBlue"
    csv: "Session 2.csv"
    comment: "CN1 blue wire - to mainboard - txd pin"
    connectedComponents: "ACdisplay-ACmainboard"
    busType: "disp-mainboard_1"
    direction: "fromACmainboard"

  - name: "wifiBrown"
    csv: "Session 2.csv"
    comment: "CN3 brown wire — wifi module (UART probes swapped in this session)"
    connectedComponents: "wifidongle-ACdisplay"
    busType: "uart"
    direction: "fromACdisplay"  # swapped: probes were physically reversed on CN3

  - name: "wifiOrange"
    csv: "Session 2.csv"
    comment: "orange wire —  wifi module (UART probes swapped in this session)"
    connectedComponents: "wifidongle-ACdisplay"
    busType: "uart"
    direction: "toACdisplay"  # swapped: probes were physically reversed on CN3

  - name: "MideaIR"
    csv: "Session 2.raw.csv"
    comment: "Raw IR signal from Midea remote control"
    connectedComponents: "IRremote-ACdisplay"
    busType: "ir_raw"
    direction: "toACdisplay"
